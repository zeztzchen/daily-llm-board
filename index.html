<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Daily LLM Board</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="page">
      <header class="hero">
        <p class="eyebrow">Daily LLM Board</p>
        <h1>每天要看的 LLM 信息</h1>
        <p class="intro">集中记录论文、模型更新、产品动态和今天需要跟进的主题。</p>
      </header>

      <section class="board" aria-label="Daily sections">
        <article class="panel">
          <h2>今日重点</h2>
          <ul>
            <li>添加今天最值得看的 3-5 条内容。</li>
            <li>记录需要进一步研究的问题。</li>
          </ul>
        </article>

        <article class="panel">
          <h2>来源</h2>
          <ul>
            <li>模型发布与实验报告</li>
            <li>论文与技术博客</li>
            <li>产品更新与行业新闻</li>
          </ul>
        </article>

        <article class="panel">
          <h2>待跟进</h2>
          <ul>
            <li>把值得长期观察的主题放在这里。</li>
            <li>为后续自动化抓取预留入口。</li>
          </ul>
        </article>
      </section>
    </main>
  </body>
</html>
